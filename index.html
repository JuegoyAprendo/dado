<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dado Digital - Juego y Aprendo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .contenedor {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .contenedor-dado {
            width: 250px;
            height: 250px;
            perspective: 1000px;
        }

        #dado {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Tornem a la sacsejada ràpida i suau del principi */
        .sacudida {
            animation: tremor 0.15s ease-in-out;
        }

        @keyframes tremor {
            0% { transform: scale(1); }
            50% { transform: scale(0.92) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .boton-imatge {
            width: 280px;
            cursor: pointer;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .boton-imatge:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>
    <img src="./logo.jpg" alt="Logo Juego y Aprendo" style="display: block; margin: 20px auto 20px auto; max-width: 155px; height: auto;">

    <div class="contenedor">
        <div class="contenedor-dado">
            <img id="dado" src="1.png" alt="Dado">
        </div>

        <img id="btnTirar" class="boton-imatge" src="BOTO TIRAR-07.jpg" alt="Botó Tirar" onclick="tirarDadoInstantaneo()">
    </div>

    <script>
        const carasDado = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png'];
        let longitudCaras = carasDado.length;
        let imgDado = document.getElementById('dado');
        
        // Variable per recordar quin número ha sortit a la tirada anterior
        let resultadoAnterior = -1; 

        function tirarDadoInstantaneo() {
            let resultadoFinal;

            // Bucle que tria un número a l'atzar i només para quan és diferent a l'anterior...
            // O quan el número anterior era el '6.png' (posició 5)
            do {
                resultadoFinal = Math.floor(Math.random() * longitudCaras);
            } while (resultadoFinal === resultadoAnterior && resultadoAnterior !== 5);

            // Guardem el resultat actual per a la pròxima tirada
            resultadoAnterior = resultadoFinal;

            // Canviem la imatge del dau
            imgDado.src = carasDado[resultadoFinal];

            // Reiniciem i activem la sacsejada curta
            imgDado.classList.remove('sacudida');
            void imgDado.offsetWidth; // Truc per reiniciar l'animació a l'instant
            imgDado.classList.add('sacudida');
        }
    </script>
</body>
</html>
